<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <!-- panel offset shadow (visible on light backgrounds) -->
  <rect x="32" y="32" width="1160" height="300" rx="28" fill="#000000" opacity="0.5"/>

  <!-- panel -->
  <rect x="20" y="20" width="1160" height="300" rx="28" fill="#000000"/>
  <rect x="22" y="22" width="1156" height="296" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="2"/>

  <!-- badge (scaled icon) -->
  <g transform="translate(46,30) scale(0.5)">
    <rect x="0" y="0" width="512" height="512" rx="40" fill="#000000"/>

    <polygon points="156,140 256,190 256,270 156,220" fill="#ffffff" opacity="0.65"/>
    <polygon points="256,190 356,140 356,220 256,270" fill="#ffffff" opacity="0.35"/>
    <polygon points="156,140 256,90 356,140 256,190" fill="#ffffff" opacity="0.95"/>

    <polygon points="256,270 80,350 256,430" fill="#ffffff" opacity="0.85"/>
    <polygon points="256,270 432,350 256,430" fill="#ffffff" opacity="0.45"/>

    <g fill="none" stroke="#000000" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
      <polyline points="156,140 256,90 356,140 356,220 256,270 156,220 156,140"/>
      <line x1="256" y1="90" x2="256" y2="270"/>
      <polyline points="80,350 256,270 432,350 256,430 80,350"/>
      <line x1="256" y1="270" x2="256" y2="430"/>
    </g>

    <rect x="2" y="2" width="508" height="508" rx="38" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="4"/>
  </g>

  <!-- wordmark -->
  <text x="382" y="205" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="112" font-weight="800" fill="#ffffff" letter-spacing="-1">Challoupe</text>
  <rect x="386" y="222" width="140" height="8" fill="#ffffff" opacity="0.5"/>
  <text x="386" y="266" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="30" font-weight="500" fill="#ffffff" opacity="0.6">Self-hosted Docker management</text>
</svg>
