services:
  challoupe:
    build: .
    container_name: challoupe
    restart: unless-stopped
    ports:
      - "3001:3001"
      # If TLS_CERT_FILE/TLS_KEY_FILE below are set, this is the HTTPS port
      # - "443:3001"
    environment:
      # Uncomment these two to have Challoupe terminate HTTPS itself.
      # Leave both unset for plain HTTP, the right choice if using a reverse proxy (Traefik/Caddy/nginx).
      # - TLS_CERT_FILE=/certs/fullchain.pem
      # - TLS_KEY_FILE=/certs/privkey.pem
      # Only if a reverse proxy sits in front.
      # - TRUST_PROXY=true   
      # Needed for OIDC SSO's callback URL if you're not on the default host/port; harmless otherwise.
      # - PUBLIC_URL=https://challoupe.example.com
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - challoupe_data:/app/data
      # Optional: your cert/key pair, only needed alongside TLS_CERT_FILE/TLS_KEY_FILE
      # - ./certs:/certs:ro
      # Optional: Read storage usage (%)
      # - /var/lib/docker:/var/lib/docker:ro 

volumes:
  challoupe_data:
